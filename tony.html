<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stark OS - Jarvis Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Orbitron:wght@400;900&display=swap"
        rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #000;
            color: #00d2ff;
            font-family: 'Fira Code', monospace;
            overflow: hidden;
            height: 100vh;
        }

        /* Fondo de Calavera Estilo CoD */
        .skull-overlay {
            position: fixed;
            inset: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.85), rgba(0, 0, 0, 0.85)),
                url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            z-index: -1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .skull-svg {
            width: 60%;
            max-width: 500px;
            opacity: 0.15;
            filter: drop-shadow(0 0 15px rgba(0, 210, 255, 0.5));
            animation: pulse 5s infinite alternate;
        }

        @keyframes pulse {
            from {
                transform: scale(1);
                opacity: 0.1;
            }

            to {
                transform: scale(1.1);
                opacity: 0.25;
            }
        }

        .screen {
            position: fixed;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 0.8s ease-in-out;
        }

        #login-screen {
            background: #000;
            z-index: 50;
        }

        #welcome-screen {
            background: #000;
            z-index: 40;
            display: none;
        }

        #main-interface {
            display: none;
            z-index: 30;
        }

        .glitch-text {
            font-family: 'Orbitron', sans-serif;
            font-size: 6rem;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 20px #00d2ff, 0 0 40px #00d2ff;
        }

        .panel {
            background: rgba(5, 15, 25, 0.8);
            border: 1px solid #005f73;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.1);
            backdrop-filter: blur(10px);
        }

        textarea {
            background: transparent;
            color: #00d2ff;
            border: none;
            outline: none;
            width: 100%;
            height: 100%;
            padding: 15px;
            font-size: 14px;
            resize: none;
        }

        #clap-indicator {
            width: 150px;
            height: 6px;
            background: #111;
            margin-top: 15px;
            overflow: hidden;
            border-radius: 10px;
            border: 1px solid #00d2ff;
        }

        #clap-level {
            height: 100%;
            width: 0%;
            background: #00d2ff;
            transition: width 0.1s;
        }

        /* Jarvis Chat Style */
        .jarvis-container {
            border-top: 2px solid #00d2ff;
            display: flex;
            flex-direction: column;
        }

        .jarvis-input {
            background: rgba(0, 210, 255, 0.1);
            border: 1px solid #00d2ff;
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            outline: none;
            width: 100%;
        }

        .jarvis-response {
            font-size: 0.85rem;
            color: #a0fbff;
            overflow-y: auto;
            max-height: 150px;
        }
    </style>
</head>

<body>

    <!-- Audio Player (Iron Man 2 Audio) -->
    <audio id="bg-audio" loop>
        <source src="Iron Man 2 _  Taller.mp3" type="audio/mp3">
    </audio>

    <div class="skull-overlay">
        <!-- SVG Calavera -->
        <svg class="skull-svg" viewBox="0 0 24 24" fill="#00d2ff">
            <path
                d="M12 2C7.03 2 3 6.03 3 11c0 3.42 1.91 6.39 4.74 7.91-.04.34-.04.69 0 1.04.14 1.14.73 2.15 1.63 2.8.25.18.55.25.86.25.19 0 .38-.03.57-.1.35-.13.53-.52.4-.87l-.46-1.23c.33-.42.74-.78 1.2-1.07.03 1.15.22 2.27.56 3.32.11.33.47.51.8.4l1.4-.46c.33-.11.51-.47.4-.8-.23-.7-.41-1.42-.53-2.15.46.29.87.65 1.2 1.07l-.46 1.23c-.13.35.05.74.4.87.19.07.38.1.57.1.31 0 .61-.07.86-.25.9-.65 1.49-1.66 1.63-2.8.04-.35.04-.7 0-1.04C19.09 17.39 21 14.42 21 11c0-4.97-4.03-9-9-9zm-3 11c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm6 0c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z" />
        </svg>
    </div>

    <!-- PANTALLA 1: INICIO -->
    <div id="login-screen" class="screen">
        <h1 class="font-bold tracking-tighter text-3xl mb-8" style="font-family: 'Orbitron';">SISTEMA STARK DESACTIVADO
        </h1>
        <div class="flex flex-col items-center gap-4">
            <input type="text" id="user-name" placeholder="IDENTIFICACIÓN"
                class="bg-transparent border-b-2 border-cyan-800 text-center text-2xl p-2 outline-none focus:border-cyan-400 transition-colors uppercase">
            <button onclick="requestPermissions()" id="btn-start"
                class="px-10 py-3 border border-cyan-500 hover:bg-cyan-500 hover:text-black font-bold transition-all duration-300">INICIAR
                SESIÓN</button>
        </div>
        <p class="mt-10 text-xs text-gray-500 uppercase tracking-widest animate-pulse" id="mic-status">Esperando sensor
            acústico...</p>
        <div id="clap-indicator" style="display: none;">
            <div id="clap-level"></div>
            <p class="text-[10px] mt-2 text-center text-cyan-400">APLAUDA PARA ACTIVAR A JARVIS</p>
        </div>
    </div>

    <!-- PANTALLA 2: BIENVENIDA -->
    <div id="welcome-screen" class="screen">
        <div id="name-display" class="glitch-text">NOMBRE</div>
    </div>

    <!-- PANTALLA 3: INTERFAZ PRINCIPAL -->
    <div id="main-interface" class="p-6 h-screen grid grid-cols-12 grid-rows-6 gap-4">
        <!-- Header -->
        <div class="col-span-12 row-span-1 flex justify-between items-center panel p-4 rounded-lg">
            <div>
                <span class="text-xs opacity-50">PROPIETARIO:</span>
                <span id="label-user" class="ml-2 font-bold uppercase text-white">USER</span>
            </div>
            <div id="clock" class="text-3xl font-bold tracking-widest text-white" style="font-family: 'Orbitron';">
                00:00:00</div>
            <div class="flex gap-4 items-center">
                <span class="text-xs text-cyan-400">JARVIS_LINK_ESTABLISHED</span>
                <div class="w-3 h-3 bg-cyan-500 rounded-full animate-ping"></div>
            </div>
        </div>

        <!-- Registro de Sistema -->
        <div class="col-span-12 md:col-span-4 row-span-5 panel rounded-lg overflow-hidden flex flex-col">
            <div class="bg-cyan-950 px-3 py-1 text-[10px] flex justify-between">
                <span>STARK_LOG.txt</span>
                <span>ID: SRK-01</span>
            </div>
            <textarea id="terminal-text" readonly></textarea>
        </div>

        <!-- Editor y Jarvis -->
        <div class="col-span-12 md:col-span-8 row-span-5 grid grid-rows-5 gap-4">
            <!-- Escritor de Código -->
            <div class="row-span-3 panel rounded-lg overflow-hidden flex flex-col">
                <div class="bg-cyan-950 px-3 py-1 text-[10px] flex justify-between items-center">
                    <span>STARK_WRITER.sh</span>
                    <button onclick="saveFile()"
                        class="bg-cyan-800 px-2 py-0.5 rounded text-white text-[9px] hover:bg-cyan-600">GUARDAR
                        DOCUMENTO</button>
                </div>
                <textarea id="code-editor" placeholder="Redacte sus notas técnicas aquí..."></textarea>
            </div>

            <!-- Jarvis Chat Inteligente -->
            <div class="row-span-2 panel rounded-lg p-4 flex flex-col jarvis-container">
                <div class="flex items-center gap-2 mb-2">
                    <div class="w-2 h-2 bg-white rounded-full"></div>
                    <span class="text-xs font-bold uppercase tracking-widest text-white">JARVIS - Unidad Central</span>
                </div>
                <div id="jarvis-log" class="jarvis-response flex-grow mb-3 p-2 font-sans italic">
                    "Bienvenido, señor. Estoy a su entera disposición. ¿En qué puedo ayudarle hoy?"
                </div>
                <div class="relative">
                    <input type="text" id="jarvis-input" class="jarvis-input font-sans"
                        placeholder="Haga una pregunta a Jarvis..." onkeypress="handleJarvisChat(event)">
                </div>
            </div>
        </div>
    </div>

    <script>
        const apiKey = ""; // La clave se proporciona en el entorno de ejecución
        let micStream;
        let audioContext;
        let analyser;
        let dataArray;
        let isWaitingClap = false;
        const terminal = document.getElementById('terminal-text');

        function updateClock() {
            const now = new Date();
            document.getElementById('clock').innerText = now.toTimeString().split(' ')[0];
        }
        setInterval(updateClock, 1000);

        async function requestPermissions() {
            const name = document.getElementById('user-name').value.trim();
            if (!name) {
                alert("INGRESE SU IDENTIFICACIÓN PARA CONTINUAR");
                return;
            }

            try {
                micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
                setupMicAnalysis();

                document.getElementById('btn-start').style.display = 'none';
                document.getElementById('mic-status').innerText = "ESPERANDO PULSO ACÚSTICO...";
                document.getElementById('clap-indicator').style.display = 'block';
                isWaitingClap = true;
            } catch (err) {
                alert("Se requiere acceso al sensor acústico: " + err);
            }
        }

        function setupMicAnalysis() {
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            const source = audioContext.createMediaStreamSource(micStream);
            analyser.fftSize = 256;
            dataArray = new Uint8Array(analyser.frequencyBinCount);
            source.connect(analyser);
            loopMic();
        }

        function loopMic() {
            analyser.getByteFrequencyData(dataArray);
            let volume = 0;
            for (let i = 0; i < dataArray.length; i++) volume += dataArray[i];
            volume = volume / dataArray.length;

            if (isWaitingClap) {
                document.getElementById('clap-level').style.width = Math.min(volume * 2, 100) + "%";
                if (volume > 75) {
                    isWaitingClap = false;
                    triggerSequence();
                }
            }
            requestAnimationFrame(loopMic);
        }

        function triggerSequence() {
            const name = document.getElementById('user-name').value;
            const audio = document.getElementById('bg-audio');

            // Sonido de Iron Man
            audio.play().catch(e => console.log("Audio Play Error:", e));

            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('welcome-screen').style.display = 'flex';
                document.getElementById('name-display').innerText = name;

                setTimeout(() => {
                    document.getElementById('welcome-screen').style.opacity = '0';
                    setTimeout(() => {
                        document.getElementById('welcome-screen').style.display = 'none';
                        document.getElementById('main-interface').style.display = 'grid';
                        document.getElementById('label-user').innerText = name;
                        initSystemLog();
                    }, 800);
                }, 3000);
            }, 800);
        }

        function initSystemLog() {
            const lines = [
                "> STARK_INDUSTRIES OS v.10.2",
                "> CARGANDO PROTOCOLOS DE COMUNICACIÓN...",
                "> ENLACE CON JARVIS ESTABLECIDO",
                "> ANALIZANDO PERFIL DE USUARIO...",
                "> TODOS LOS SISTEMAS OPERATIVOS.",
                "> BIENVENIDO A CASA."
            ];
            let i = 0;
            const timer = setInterval(() => {
                if (i < lines.length) {
                    terminal.value += lines[i] + "\n";
                    terminal.scrollTop = terminal.scrollHeight;
                    i++;
                } else {
                    clearInterval(timer);
                }
            }, 400);
        }

        // --- FUNCIONES DE JARVIS (IA) ---

        async function handleJarvisChat(e) {
            if (e.key === 'Enter') {
                const inputEl = document.getElementById('jarvis-input');
                const logEl = document.getElementById('jarvis-log');
                const userQuery = inputEl.value.trim();

                if (!userQuery) return;

                logEl.innerText = "Pensando, señor...";
                inputEl.value = "";
                inputEl.disabled = true;

                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: userQuery }] }],
                            systemInstruction: {
                                parts: [{ text: "Eres JARVIS, la inteligencia artificial de Tony Stark. Eres sumamente inteligente, servicial, un poco sarcástico pero muy educado. Tus respuestas son rápidas, precisas y siempre te diriges al usuario como 'señor'. Responde siempre en español." }]
                            }
                        })
                    });

                    const result = await response.json();
                    const text = result.candidates?.[0]?.content?.parts?.[0]?.text || "Lo lamento, señor. He tenido un error en mis servidores centrales.";

                    logEl.innerText = text;
                } catch (error) {
                    logEl.innerText = "Señor, mis protocolos de comunicación han fallado. Por favor, inténtelo de nuevo.";
                } finally {
                    inputEl.disabled = false;
                    inputEl.focus();
                }
            }
        }

        function saveFile() {
            const content = document.getElementById('code-editor').value;
            const blob = new Blob([content], { type: 'text/plain' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'stark_notes.txt';
            a.click();
        }
    </script>
</body>

</html>
