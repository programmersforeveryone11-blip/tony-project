<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stark - Jarvis Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&family=Orbitron:wght@400;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --primary-dim: #005f73;
            --bg-panel: rgba(5, 15, 25, 0.8);
        }

        .theme-orange {
            --primary: #ff9d00;
            --primary-dim: #734500;
            --bg-panel: rgba(25, 15, 5, 0.8);
        }

        .theme-red {
            --primary: #ff3c00;
            --primary-dim: #731a00;
            --bg-panel: rgba(25, 5, 5, 0.8);
        }

        body {
            margin: 0; background-color: #000; color: var(--primary);
            font-family: 'Fira Code', monospace; overflow: hidden; height: 100vh;
        }

        .skull-overlay {
            position: fixed; inset: 0; z-index: -1; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
        }

        .skull-svg {
            width: 50%; opacity: 0.15; fill: var(--primary);
            filter: drop-shadow(0 0 15px var(--primary));
            animation: pulse 4s infinite alternate;
        }

        @keyframes pulse { from { transform: scale(1); opacity: 0.1; } to { transform: scale(1.05); opacity: 0.2; } }

        .screen { position: fixed; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: all 0.6s ease; }
        
        #login-screen { background: #000; z-index: 50; }
        #welcome-screen { background: #000; z-index: 40; display: none; }
        #main-interface { display: none; z-index: 30; }

        .panel { background: var(--bg-panel); border: 1px solid var(--primary-dim); backdrop-filter: blur(10px); }
        
        .jarvis-input {
            background: rgba(255, 255, 255, 0.05); border: 1px solid var(--primary-dim);
            color: white; padding: 10px; width: 100%; outline: none;
        }

        #clap-indicator {
            width: 200px; height: 8px; background: #111; margin-top: 20px;
            border-radius: 4px; border: 1px solid var(--primary); overflow: hidden;
        }
        #clap-level { height: 100%; width: 0%; background: var(--primary); transition: width 0.05s; }

        .theme-btn { width: 22px; height: 22px; border-radius: 50%; cursor: pointer; border: 1px solid rgba(255,255,255,0.3); }
    </style>
</head>

<body id="main-body">

    <audio id="bg-audio" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3">
    </audio>

    <div class="skull-overlay">
        <svg class="skull-svg" viewBox="0 0 24 24"><path d="M12 2C7.03 2 3 6.03 3 11c0 3.42 1.91 6.39 4.74 7.91-.04.34-.04.69 0 1.04.14 1.14.73 2.15 1.63 2.8.25.18.55.25.86.25.19 0 .38-.03.57-.1.35-.13.53-.52.4-.87l-.46-1.23c.33-.42.74-.78 1.2-1.07.03 1.15.22 2.27.56 3.32.11.33.47.51.8.4l1.4-.46c.33-.11.51-.47.4-.8-.23-.7-.41-1.42-.53-2.15.46.29.87.65 1.2 1.07l-.46 1.23c-.13.35.05.74.4.87.19.07.38.1.57.1.31 0 .61-.07.86-.25.9-.65 1.49-1.66 1.63-2.8.04-.35.04-.7 0-1.04C19.09 17.39 21 14.42 21 11c0-4.97-4.03-9-9-9zm-3 11c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2zm6 0c-1.1 0-2-.9-2-2s.9-2 2-2 2 .9 2 2-.9 2-2 2z"/></svg>
    </div>

    <div id="login-screen" class="screen">
        <h1 class="font-bold tracking-tighter text-3xl mb-8" style="font-family: 'Orbitron';">SISTEMA STARK DESCONECTADO</h1>
        <div class="flex flex-col items-center gap-4">
            <input type="text" id="user-name" placeholder="IDENTIFICACIÓN" class="bg-transparent border-b-2 border-cyan-900 text-center text-2xl p-2 outline-none focus:border-cyan-400 transition-all uppercase">
            <button onclick="initSenses()" id="btn-start" class="px-10 py-3 border border-cyan-500 hover:bg-cyan-500 hover:text-black font-bold transition-all">ESTABLECER CONEXIÓN</button>
        </div>
        
        <div id="clap-area" class="mt-10 hidden flex flex-col items-center">
            <p class="text-xs uppercase tracking-widest animate-pulse mb-2">Sensor Acústico Activo</p>
            <div id="clap-indicator">
                <div id="clap-level"></div>
            </div>
            <p class="text-[10px] mt-4 text-cyan-400">EMITA UN SONIDO FUERTE (APLAUSO) PARA AUTENTICAR</p>
        </div>
    </div>

    <div id="welcome-screen" class="screen">
        <div id="name-display" class="font-black text-6xl tracking-tighter uppercase" style="font-family: 'Orbitron'; text-shadow: 0 0 20px var(--primary);"></div>
    </div>

    <div id="main-interface" class="p-6 h-screen grid grid-cols-12 grid-rows-6 gap-4">
        <div class="col-span-12 row-span-1 flex justify-between items-center panel p-4 rounded-lg">
            <div class="flex items-center gap-4">
                <div onclick="setTheme('cyan')" class="theme-btn bg-cyan-500"></div>
                <div onclick="setTheme('orange')" class="theme-btn bg-orange-500"></div>
                <div onclick="setTheme('red')" class="theme-btn bg-red-600"></div>
                <span id="label-user" class="ml-4 font-bold uppercase border-l pl-4 border-gray-700">USER</span>
            </div>
            <div id="clock" class="text-2xl font-bold font-mono">00:00:00</div>
            <div class="text-[10px] tracking-widest text-cyan-400">JARVIS_V7.2_ESTABLE</div>
        </div>

        <div class="col-span-4 row-span-5 panel rounded-lg p-2">
            <textarea id="terminal-text" class="h-full w-full bg-transparent text-[10px] resize-none outline-none" readonly></textarea>
        </div>

        <div class="col-span-8 row-span-5 flex flex-col gap-4">
            <div class="flex-grow panel rounded-lg p-2">
                <textarea id="code-editor" class="h-full w-full bg-transparent text-sm font-mono" placeholder="// Notas de la misión..."></textarea>
            </div>
            <div class="h-1/3 panel rounded-lg p-4 flex flex-col border-t-2 border-cyan-500">
                <div id="jarvis-log" class="flex-grow overflow-y-auto text-sm italic mb-2 opacity-80">"Esperando sus órdenes, señor."</div>
                <input type="text" id="jarvis-input" class="jarvis-input" placeholder="Comando de voz/texto..." onkeypress="handleJarvisChat(event)">
            </div>
        </div>
    </div>

    <script>
        let audioContext, analyser, dataArray, micSource;
        let isWaitingClap = false;

        function setTheme(theme) {
            document.getElementById('main-body').className = theme === 'cyan' ? '' : 'theme-' + theme;
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString();
        }, 1000);

        async function initSenses() {
            const name = document.getElementById('user-name').value.trim();
            if (!name) return alert("IDENTIFÍQUESE, SEÑOR");

            try {
                // Solicitar micrófono
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                
                // Iniciar AudioContext (Debe ser tras el clic)
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                micSource = audioContext.createMediaStreamSource(stream);
                
                analyser.fftSize = 256;
                dataArray = new Uint8Array(analyser.frequencyBinCount);
                micSource.connect(analyser);

                // Cambiar UI
                document.getElementById('btn-start').classList.add('hidden');
                document.getElementById('user-name').classList.add('hidden');
                document.getElementById('clap-area').classList.remove('hidden');
                
                isWaitingClap = true;
                detectSound();
            } catch (err) {
                alert("ERROR: Sensor acústico no disponible o permiso denegado.");
            }
        }

        function detectSound() {
            if (!isWaitingClap) return;
            
            analyser.getByteFrequencyData(dataArray);
            // Calculamos el volumen promedio
            let volume = 0;
            for (let i = 0; i < dataArray.length; i++) volume += dataArray[i];
            volume = volume / dataArray.length;

            document.getElementById('clap-level').style.width = Math.min(volume * 2.5, 100) + "%";

            // Umbral de aplauso (Ajustado a 70 para sensibilidad media)
            if (volume > 70) {
                isWaitingClap = false;
                accessGranted();
            } else {
                requestAnimationFrame(detectSound);
            }
        }

        function accessGranted() {
            const name = document.getElementById('user-name').value;
            document.getElementById('bg-audio').play().catch(() => {});
            
            document.getElementById('login-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('login-screen').style.display = 'none';
                const welcome = document.getElementById('welcome-screen');
                welcome.style.display = 'flex';
                document.getElementById('name-display').innerText = "BIENVENIDO " + name;
                
                setTimeout(() => {
                    welcome.style.opacity = '0';
                    setTimeout(() => {
                        welcome.style.display = 'none';
                        document.getElementById('main-interface').style.display = 'grid';
                        document.getElementById('label-user').innerText = name;
                        logSystem();
                    }, 600);
                }, 2000);
            }, 600);
        }

        function logSystem() {
            const term = document.getElementById('terminal-text');
            const lines = ["> NÚCLEO STARK: ONLINE", "> SENSORES ACÚSTICOS: CALIBRADOS", "> CIFRADO DE DATOS: ACTIVO", "> JARVIS: A SU SERVICIO, SEÑOR."];
            let i = 0;
            const interval = setInterval(() => {
                if(i < lines.length) term.value += lines[i++] + "\n";
                else clearInterval(interval);
            }, 500);
        }

        function handleJarvisChat(e) {
            if (e.key === 'Enter') {
                const input = document.getElementById('jarvis-input');
                const log = document.getElementById('jarvis-log');
                const val = input.value;
                if(!val) return;

                log.innerText = "Analizando...";
                setTimeout(() => {
                    log.innerText = `Señor, respecto a "${val}", los servidores indican que todo está bajo control. ¿Desea que prepare el traje Mark XLII?`;
                    input.value = "";
                }, 800);
            }
        }
    </script>
</body>
</html>
